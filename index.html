<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vehicle Transport Agreement | SkyLine Professional Logistics</title>

<style>
body { font-family: Arial; max-width: 850px; margin: auto; padding: 30px; color: #222; }
h1 { text-align: center; margin-bottom: 5px; }
.subtitle { text-align: center; font-size: 14px; color: gray; margin-bottom: 30px; }
.section { background: #f8f8f8; padding: 25px; border-radius: 6px; margin-bottom: 25px; }
.row { display: flex; gap: 40px; margin-bottom: 15px; }
.label { font-weight: bold; margin-bottom: 4px; }
hr { border: none; border-top: 1px solid #ddd; margin: 20px 0; }
button { padding: 12px 30px; font-size: 15px; cursor: pointer; margin-top: 10px; }
canvas { border: 1px solid #ccc; width: 100%; height: 150px; margin-bottom: 10px; touch-action: none; }
</style>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbzuzxO9ENzk1ZDEgH4B6-WdBlOZiIKmhPh23Q9hcVTHp8agm2BT2Fm_sJZKgzKaEEvQFw/exec";

let userIP = "Fetching...";
fetch("https://api.ipify.org?format=json")
.then(res => res.json())
.then(data => { userIP = data.ip; });

// Prefill
function fillData() {
    const p = new URLSearchParams(window.location.search);

    ["vehicle","condition","pickup","pzip","delivery","dzip","date","est_delivery","price"].forEach(id => {
        const val = p.get(id) || "";
        document.getElementById(id).innerText = val;
        document.getElementById("form_"+id).value = val;
    });

    document.getElementById("name").value = p.get("name") || "";
    document.getElementById("email").value = p.get("email") || "";
    document.getElementById("phone").value = p.get("phone") || "";
}

// Signature Pad
let canvas, ctx, drawing=false, lastX=0, lastY=0;
function initSignaturePad() {
    canvas = document.getElementById("signature-pad");
    ctx = canvas.getContext("2d");
    const style = getComputedStyle(canvas);
    canvas.width = parseInt(style.width);
    canvas.height = parseInt(style.height);

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        if(e.touches) return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function start(e){ drawing=true; const pos=getPos(e); lastX=pos.x; lastY=pos.y; }
    function end(){ drawing=false; }
    function move(e){
        if(!drawing) return;
        e.preventDefault();
        const pos = getPos(e);
        ctx.lineWidth=2; ctx.lineCap='round'; ctx.strokeStyle="#000";
        ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(pos.x,pos.y); ctx.stroke();
        lastX=pos.x; lastY=pos.y;
        document.getElementById("signature-input").value = canvas.toDataURL();
    }

    ["mousedown","touchstart"].forEach(evt => canvas.addEventListener(evt,start));
    ["mouseup","mouseout","touchend"].forEach(evt => canvas.addEventListener(evt,end));
    ["mousemove","touchmove"].forEach(evt => canvas.addEventListener(evt,move));
}

function clearSignature(){ 
    ctx.clearRect(0,0,canvas.width,canvas.height); 
    document.getElementById("signature-input").value=""; 
}

// ✅ IMAGE GENERATION (RESTORED)
function generateContractImage(callback) {
    const c = document.createElement("canvas");
    const ctx = c.getContext("2d");

    c.width = 900;
    c.height = 1200;

    ctx.fillStyle = "#f2f2f2";
    ctx.fillRect(0, 0, c.width, c.height);

    ctx.fillStyle = "#fff";
    ctx.fillRect(50, 50, 800, 1100);

    ctx.fillStyle = "#000";

    ctx.font = "bold 26px Arial";
    ctx.textAlign = "center";
    ctx.fillText("Vehicle Transport Agreement", 450, 100);

    ctx.font = "14px Arial";
    ctx.fillText("SkyLine Professional Logistics", 450, 130);

    ctx.textAlign = "left";

    let y = 180;

    function row(label, value) {
        ctx.font = "bold 13px Arial";
        ctx.fillText(label + ":", 80, y);
        ctx.font = "13px Arial";
        ctx.fillText(value || "-", 250, y);
        y += 30;
    }

    row("Customer Name", document.getElementById("name").value);
    row("Email", document.getElementById("email").value);
    row("Phone", document.getElementById("phone").value);

    y += 20;

    row("Vehicle", document.getElementById("vehicle").innerText);
    row("Condition", document.getElementById("condition").innerText);
    row("Pickup", document.getElementById("pickup").innerText);
    row("Pickup ZIP", document.getElementById("pzip").innerText);
    row("Delivery", document.getElementById("delivery").innerText);
    row("Delivery ZIP", document.getElementById("dzip").innerText);
    row("Pickup Date", document.getElementById("date").innerText);
    row("Estimated Delivery", document.getElementById("est_delivery").innerText);
    row("Price", "$" + document.getElementById("price").innerText);

    y += 30;

    ctx.fillText("Signature:", 80, y);
    y += 10;
    ctx.strokeRect(80, y, 400, 120);

    const sigImg = new Image();
    sigImg.src = document.getElementById("signature-input").value;

    sigImg.onload = () => {
        ctx.drawImage(sigImg, 90, y + 10, 300, 100);

        y += 150;
        ctx.fillText("IP: " + userIP, 80, y);
        y += 20;
        ctx.fillText("Timestamp: " + new Date().toString(), 80, y);

        callback(c.toDataURL("image/png"));
    };
}

// ✅ FINAL SUBMIT (FIXED)
async function handleSubmit(e){
    e.preventDefault();

    const signature = document.getElementById("signature-input").value;
    if(!signature){ alert("Please provide your signature."); return; }

    const data = ["vehicle","condition","pickup","pzip","delivery","dzip","date","est_delivery","price"].reduce((obj,id)=>{
        obj[id] = document.getElementById("form_"+id).value;
        return obj;
    },{});

    data.name = document.getElementById("name").value;
    data.email = document.getElementById("email").value;
    data.phone = document.getElementById("phone").value;
    data.signature = signature;
    data.ip = userIP;
    data.timestamp = new Date().toISOString();

    generateContractImage(async (img) => {

        data.contractImage = img;

        await fetch(SHEET_URL, {
            method:"POST",
            body: JSON.stringify(data)
        });

        document.getElementById("bookingForm").submit();
    });
}

window.onload = function(){
    fillData(); 
    initSignaturePad();
    document.getElementById("bookingForm").addEventListener("submit", handleSubmit);
};
</script>
</head>

<body>

<h1>Vehicle Transport Agreement</h1>
<div class="subtitle">SkyLine Professional Logistics</div>

<div class="section">

<div class="row">
<div style="flex:1;"><div class="label">Customer Name</div><input type="text" id="name" required></div>
<div style="flex:1;"><div class="label">Email</div><input type="email" id="email" required></div>
<div style="flex:1;"><div class="label">Phone</div><input type="text" id="phone" required></div>
</div>

<hr>

<div class="row">
<div style="flex:2;"><div class="label">Vehicle</div><div id="vehicle"></div></div>
<div style="flex:1;"><div class="label">Condition</div><div id="condition"></div></div>
</div>

<hr>

<div class="row">
<div style="flex:2;"><div class="label">Pickup</div><div id="pickup"></div></div>
<div style="flex:1;"><div class="label">ZIP</div><div id="pzip"></div></div>
</div>

<div class="row">
<div style="flex:2;"><div class="label">Delivery</div><div id="delivery"></div></div>
<div style="flex:1;"><div class="label">ZIP</div><div id="dzip"></div></div>
</div>

<hr>

<div class="row">
<div style="flex:2;"><div class="label">Pickup Date</div><div id="date"></div></div>
<div style="flex:2;"><div class="label">Estimated Delivery</div><div id="est_delivery"></div></div>
<div style="flex:1;"><div class="label">Price</div><div>$<span id="price"></span></div></div>
</div>

</div>

<form id="bookingForm" action="https://formsubmit.co/ranveer.sood45@gmail.com" method="POST">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_next" value="https://skylineprofessionalservice.online/">

<input type="hidden" id="form_vehicle">
<input type="hidden" id="form_condition">
<input type="hidden" id="form_pickup">
<input type="hidden" id="form_pzip">
<input type="hidden" id="form_delivery">
<input type="hidden" id="form_dzip">
<input type="hidden" id="form_date">
<input type="hidden" id="form_est_delivery">
<input type="hidden" id="form_price">

<div>
<label><strong>Sign Here:</strong></label>
<canvas id="signature-pad"></canvas>
<button type="button" onclick="clearSignature()">Clear Signature</button>
<input type="hidden" name="Signature" id="signature-input">
</div>

<p><input type="checkbox" required> I confirm the above information is correct.</p>
<button type="submit">Confirm Booking</button>
</form>

</body>
</html>
