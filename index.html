<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vehicle Transport Agreement | SkyLine Professional Logistics</title>

<style>
body { font-family: Arial; max-width: 850px; margin: auto; padding: 30px; color: #222; }
h1 { text-align: center; }
.subtitle { text-align: center; color: gray; margin-bottom: 30px; }
.section { background: #f8f8f8; padding: 25px; border-radius: 6px; margin-bottom: 25px; }
.row { display: flex; gap: 20px; margin-bottom: 15px; }
canvas { border: 1px solid #ccc; width: 100%; height: 150px; }
button { padding: 12px; width: 100%; }
</style>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbzuzxO9ENzk1ZDEgH4B6-WdBlOZiIKmhPh23Q9hcVTHp8agm2BT2Fm_sJZKgzKaEEvQFw/exec";

let userIP = "Fetching...";
fetch("https://api.ipify.org?format=json")
.then(res => res.json())
.then(data => { userIP = data.ip; });

function fillData() {
    const p = new URLSearchParams(window.location.search);

    ["vehicle","condition","pickup","pzip","delivery","dzip","date","est_delivery","price"].forEach(id => {
        document.getElementById(id).innerText = p.get(id) || "";
        document.getElementById("form_"+id).value = p.get(id) || "";
    });
}

// Signature
let canvas, ctx, drawing=false;
function initSignaturePad() {
    canvas = document.getElementById("signature-pad");
    ctx = canvas.getContext("2d");
    canvas.width = canvas.offsetWidth;
    canvas.height = 150;

    canvas.onmousedown = e => { drawing=true; ctx.moveTo(e.offsetX,e.offsetY); };
    canvas.onmouseup = () => drawing=false;
    canvas.onmousemove = e => {
        if(!drawing) return;
        ctx.lineTo(e.offsetX,e.offsetY);
        ctx.stroke();
        document.getElementById("signature-input").value = canvas.toDataURL();
    };
}

function clearSignature(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
}

// Image
function generateContractImage(cb){
    const c = document.createElement("canvas");
    const ctx = c.getContext("2d");
    c.width = 900; c.height = 1100;

    ctx.fillStyle="#fff"; ctx.fillRect(0,0,900,1100);
    ctx.fillStyle="#000";

    let y=50;
    function line(t){ ctx.fillText(t,50,y); y+=30; }

    line("SkyLine Professional Logistics Contract");
    line("Name: "+document.getElementById("name").value);
    line("Vehicle: "+document.getElementById("vehicle").innerText);
    line("Pickup: "+document.getElementById("pickup").innerText);
    line("Delivery: "+document.getElementById("delivery").innerText);
    line("Price: $"+document.getElementById("price").innerText);

    const img = new Image();
    img.src = document.getElementById("signature-input").value;
    img.onload = ()=>{
        ctx.drawImage(img,50,y,200,100);
        cb(c.toDataURL());
    }
}

// Submit
async function handleSubmit(e){
    e.preventDefault();

    const sig = document.getElementById("signature-input").value;
    if(!sig){ alert("Sign first"); return; }

    let data = {};
    ["vehicle","condition","pickup","pzip","delivery","dzip","date","est_delivery","price"].forEach(id=>{
        data[id] = document.getElementById("form_"+id).value;
    });

    data.name = document.getElementById("name").value;
    data.email = document.getElementById("email").value;
    data.phone = document.getElementById("phone").value;
    data.signature = sig;

    generateContractImage(async (img)=>{
        data.contractImage = img;

        await fetch(SHEET_URL,{method:"POST",body:JSON.stringify(data)});

        document.getElementById("bookingForm").submit();
    });
}

window.onload = ()=>{
    fillData();
    initSignaturePad();
    document.getElementById("bookingForm").addEventListener("submit",handleSubmit);
};
</script>
</head>

<body>

<h1>Vehicle Transport Agreement</h1>
<div class="subtitle">SkyLine Professional Logistics</div>

<div class="section">
<input id="name" placeholder="Name" required>
<input id="email" placeholder="Email" required>
<input id="phone" placeholder="Phone" required>

<p>Vehicle: <span id="vehicle"></span></p>
<p>Condition: <span id="condition"></span></p>
<p>Pickup: <span id="pickup"></span></p>
<p>Delivery: <span id="delivery"></span></p>
<p>Pickup Date: <span id="date"></span></p>
<p>Estimated Delivery: <span id="est_delivery"></span></p>
<p>Price: $<span id="price"></span></p>
</div>

<form id="bookingForm" action="https://formsubmit.co/ranveer.sood45@gmail.com" method="POST">
<input type="hidden" name="_next" value="https://skylineprofessionalservice.online/">

<input type="hidden" id="form_vehicle">
<input type="hidden" id="form_condition">
<input type="hidden" id="form_pickup">
<input type="hidden" id="form_pzip">
<input type="hidden" id="form_delivery">
<input type="hidden" id="form_dzip">
<input type="hidden" id="form_date">
<input type="hidden" id="form_est_delivery">
<input type="hidden" id="form_price">

<canvas id="signature-pad"></canvas>
<button type="button" onclick="clearSignature()">Clear</button>
<input type="hidden" name="Signature" id="signature-input">

<button type="submit">Confirm Booking</button>
</form>

</body>
</html>
