<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SkyLine Link Generator</title>
</head>

<body>

<h2>Generate Contract Link</h2>

<input id="vehicle" placeholder="Vehicle"><br>
<input id="pickup" placeholder="Pickup"><br>
<input id="delivery" placeholder="Delivery"><br>
<input id="date" placeholder="Pickup Date"><br>
<input id="est_delivery" placeholder="Delivery Date"><br>
<input id="price" placeholder="Price"><br>

<button onclick="gen()">Generate</button>

<p id="link"></p>

<script>
function gen(){
const base="https://YOUR_USERNAME.github.io/YOUR_REPO/index.html";

const url=base+
"?vehicle="+vehicle.value+
"&pickup="+pickup.value+
"&delivery="+delivery.value+
"&date="+date.value+
"&est_delivery="+est_delivery.value+
"&price="+price.value;

document.getElementById("link").innerText=url;
}
</script>

</body>
</html>
